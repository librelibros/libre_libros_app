name: Keep Render service awake

# Render free duerme el servicio tras 15 min sin tráfico (cold start ~30-60s).
# Este workflow le manda un GET /healthz cada 10 min para mantenerlo caliente.
# El cron de GitHub Actions puede demorarse en picos de carga, pero el margen
# de 5 min sobre los 15 de Render es suficiente en la práctica.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /healthz
        env:
          PUBLIC_URL: https://libre-libros-app.onrender.com
        run: |
          set -euo pipefail
          # Si el servicio estaba dormido, la primera request lo despierta y
          # puede tardar bastante. Damos hasta 90s al curl, y reintentamos 3
          # veces antes de fallar.
          for attempt in 1 2 3; do
            echo "Attempt $attempt -> $PUBLIC_URL/healthz"
            if curl -fsS -m 90 "$PUBLIC_URL/healthz"; then
              echo
              echo "OK"
              exit 0
            fi
            echo "Attempt $attempt failed."
            sleep 15
          done
          echo "All attempts failed — Render service unreachable." >&2
          exit 1
