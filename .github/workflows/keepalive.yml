name: Keep Render service awake

# Render free duerme el servicio tras 15 min sin tráfico (cold start ~30-60s).
# Mantenemos un GET /healthz periódico para evitarlo.
#
# CAVEAT: GitHub Actions cron es best-effort. La doc oficial dice que durante
# picos de carga los schedules se saltan, y se confirma en los runs históricos
# de este repo: con `*/10 * * * *` solo se dispararon 2 ejecuciones en 24h.
# Por eso definimos varios schedules con offsets primos (en vez de minutos
# múltiplos de 5/10 que sufren stampedes globales): aunque GitHub salte
# alguno, otro debería llegar antes del límite de 15 min de Render.
#
# Para fiabilidad real (>99 %), configura ADEMÁS un monitor externo gratuito:
#   - UptimeRobot (https://uptimerobot.com) → 50 monitors, ping cada 5 min.
#   - cron-job.org → cron remoto cada 1 min.
# Apuntando a https://libre-libros-app.onrender.com/healthz. Ver
# docs/production-incident-workflow.md, sección "Keepalive de Render".

on:
  schedule:
    - cron: '3,17 * * * *'    # min 3 y 17 — ventana de 14 min
    - cron: '31,45 * * * *'   # min 31 y 45 — ventana de 14 min
    - cron: '58 * * * *'      # respaldo cerca del fin de hora
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /healthz
        env:
          PUBLIC_URL: https://libre-libros-app.onrender.com
        run: |
          set -euo pipefail
          # Si el servicio estaba dormido, la primera request lo despierta y
          # puede tardar bastante. Damos hasta 90s al curl, y reintentamos 3
          # veces antes de fallar.
          for attempt in 1 2 3; do
            echo "Attempt $attempt -> $PUBLIC_URL/healthz"
            if curl -fsS -m 90 "$PUBLIC_URL/healthz"; then
              echo
              echo "OK"
              exit 0
            fi
            echo "Attempt $attempt failed."
            sleep 15
          done
          echo "All attempts failed — Render service unreachable." >&2
          exit 1
