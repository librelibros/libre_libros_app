name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=0
          for v in RENDER_API_KEY RENDER_SERVICE_ID SUPABASE_URL SUPABASE_KEY LIBRE_LIBROS_SECRET_KEY LIBRE_LIBROS_DATABASE_URL; do
            if [ -z "${{ secrets[$v] || '' }}" ]; then
              echo "Secret $v is not set in repository settings. Please add it." >&2
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Sync env vars to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LIBRE_LIBROS_SECRET_KEY: ${{ secrets.LIBRE_LIBROS_SECRET_KEY }}
          LIBRE_LIBROS_DATABASE_URL: ${{ secrets.LIBRE_LIBROS_DATABASE_URL }}
        run: |
          set -euo pipefail
          upsert() {
            local key="$1"
            local value="$2"
            echo "Upserting env var $key"
            curl -fsS -X PUT \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/$key" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg v "$value" '{value: $v}')" > /dev/null
          }

          upsert "SUPABASE_URL"               "$SUPABASE_URL"
          upsert "SUPABASE_KEY"               "$SUPABASE_KEY"
          upsert "LIBRE_LIBROS_SECRET_KEY"    "$LIBRE_LIBROS_SECRET_KEY"
          upsert "LIBRE_LIBROS_DATABASE_URL"  "$LIBRE_LIBROS_DATABASE_URL"

      - name: Trigger Render deploy via API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          echo "Triggering deploy for service $RENDER_SERVICE_ID"
          resp=$(curl -fsS -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}')
          echo "$resp" | jq .
