name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LIBRE_LIBROS_SECRET_KEY: ${{ secrets.LIBRE_LIBROS_SECRET_KEY }}
          LIBRE_LIBROS_DATABASE_URL: ${{ secrets.LIBRE_LIBROS_DATABASE_URL }}
        run: |
          missing=0
          for v in RENDER_API_KEY RENDER_SERVICE_ID SUPABASE_URL SUPABASE_KEY LIBRE_LIBROS_SECRET_KEY LIBRE_LIBROS_DATABASE_URL; do
            if [ -z "${!v:-}" ]; then
              echo "Secret $v is not set in repository settings. Please add it." >&2
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Sync env vars to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LIBRE_LIBROS_SECRET_KEY: ${{ secrets.LIBRE_LIBROS_SECRET_KEY }}
          LIBRE_LIBROS_DATABASE_URL: ${{ secrets.LIBRE_LIBROS_DATABASE_URL }}
          LIBRE_LIBROS_GITHUB_OAUTH_CLIENT_ID: ${{ secrets.LIBRE_LIBROS_GITHUB_OAUTH_CLIENT_ID }}
          LIBRE_LIBROS_GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.LIBRE_LIBROS_GITHUB_OAUTH_CLIENT_SECRET }}
          LIBRE_LIBROS_INIT_ADMIN_EMAIL: ${{ secrets.LIBRE_LIBROS_INIT_ADMIN_EMAIL }}
          LIBRE_LIBROS_INIT_ADMIN_PASSWORD: ${{ secrets.LIBRE_LIBROS_INIT_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          upsert() {
            local key="$1"
            local value="$2"
            echo "Upserting env var $key"
            curl -fsS -X PUT \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/$key" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg v "$value" '{value: $v}')" > /dev/null
          }
          upsert_optional() {
            local key="$1"
            local value="$2"
            if [ -n "$value" ]; then
              upsert "$key" "$value"
            else
              echo "Skipping $key (secret not set in GitHub)"
            fi
          }

          upsert "SUPABASE_URL"               "$SUPABASE_URL"
          upsert "SUPABASE_KEY"               "$SUPABASE_KEY"
          upsert "LIBRE_LIBROS_SECRET_KEY"    "$LIBRE_LIBROS_SECRET_KEY"
          upsert "LIBRE_LIBROS_DATABASE_URL"  "$LIBRE_LIBROS_DATABASE_URL"
          upsert_optional "LIBRE_LIBROS_GITHUB_OAUTH_CLIENT_ID"     "$LIBRE_LIBROS_GITHUB_OAUTH_CLIENT_ID"
          upsert_optional "LIBRE_LIBROS_GITHUB_OAUTH_CLIENT_SECRET" "$LIBRE_LIBROS_GITHUB_OAUTH_CLIENT_SECRET"
          upsert_optional "LIBRE_LIBROS_INIT_ADMIN_EMAIL"           "$LIBRE_LIBROS_INIT_ADMIN_EMAIL"
          upsert_optional "LIBRE_LIBROS_INIT_ADMIN_PASSWORD"        "$LIBRE_LIBROS_INIT_ADMIN_PASSWORD"

      - name: Trigger Render deploy via API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          echo "Triggering deploy for service $RENDER_SERVICE_ID"
          http_code=$(curl -sS -o /tmp/render_resp.json -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          echo "HTTP $http_code"
          jq . /tmp/render_resp.json || cat /tmp/render_resp.json
          if [ "$http_code" -ge 400 ]; then
            exit 1
          fi
