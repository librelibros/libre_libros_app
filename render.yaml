services:
  - type: web
    name: libre-libros
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # --- Core app ---
      - key: LIBRE_LIBROS_SECRET_KEY
        sync: false
      # Production database. Set this to the Supabase Postgres connection
      # string (Project Settings -> Database -> Connection string -> URI).
      # Example: postgresql+psycopg://postgres:<password>@db.<ref>.supabase.co:5432/postgres
      - key: LIBRE_LIBROS_DATABASE_URL
        sync: false

      # --- Supabase client (used by app.supabase_client) ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

      # --- Bootstrap content repo ---
      - key: LIBRE_LIBROS_BOOTSTRAP_REPOSITORY_PROVIDER
        value: github
      - key: LIBRE_LIBROS_BOOTSTRAP_REPOSITORY_NAME
        value: Libre Libros Content
      - key: LIBRE_LIBROS_BOOTSTRAP_REPOSITORY_SLUG
        value: libre-libros-content
      - key: LIBRE_LIBROS_BOOTSTRAP_REPOSITORY_NAMESPACE
        value: librelibros
      - key: LIBRE_LIBROS_BOOTSTRAP_REPOSITORY_NAME_REMOTE
        value: libre_libros_content
      - key: LIBRE_LIBROS_BOOTSTRAP_REPOSITORY_DEFAULT_BRANCH
        value: main
      - key: LIBRE_LIBROS_BOOTSTRAP_REPOSITORY_PUBLIC
        value: true
      - key: LIBRE_LIBROS_BOOTSTRAP_REPOSITORY_TOKEN
        sync: false

      # --- Auth ---
      - key: LIBRE_LIBROS_EXTERNAL_AUTH_ONLY
        value: true
      - key: LIBRE_LIBROS_GITHUB_OAUTH_ENABLED
        value: true
      - key: LIBRE_LIBROS_GITHUB_OAUTH_CLIENT_ID
        sync: false
      - key: LIBRE_LIBROS_GITHUB_OAUTH_CLIENT_SECRET
        sync: false
      - key: LIBRE_LIBROS_GITHUB_OAUTH_NAME
        value: GitHub
      - key: LIBRE_LIBROS_INIT_ADMIN_EMAIL
        sync: false
      - key: LIBRE_LIBROS_INIT_ADMIN_PASSWORD
        sync: false
      - key: LIBRE_LIBROS_INIT_ADMIN_NAME
        value: Administrador
      - key: LIBRE_LIBROS_CONTACT_EMAIL
        sync: false
